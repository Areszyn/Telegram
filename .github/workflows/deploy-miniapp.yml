name: Deploy Mini App

on:
  push:
    branches: [main]
    paths:
      - "artifacts/miniapp/**"
      - "lib/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Mini App
        run: pnpm --filter @workspace/miniapp build
        env:
          PORT: "3000"
          BASE_PATH: "/"
          VITE_API_URL: "https://mini.susagar.sbs/api"
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        working-directory: artifacts/miniapp
        run: npx wrangler pages deploy dist/public --project-name lifegram-miniapp --commit-dirty true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
