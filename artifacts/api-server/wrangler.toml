name = "lifegram-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "lifegram"
database_id = "c980ccc5-97e0-4685-9af5-f61a746f14e1"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "waspros"

[triggers]
crons = ["*/2 * * * *"]

# Non-sensitive vars
[vars]
NODE_ENV = "production"

# Secrets (set via: wrangler secret put <KEY>)
# BOT_TOKEN
# ADMIN_ID
# OXAPAY_MERCHANT_KEY
# R2_PUBLIC_URL
# TELEGRAM_API_ID
# TELEGRAM_API_HASH
