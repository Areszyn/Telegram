name = "lifegram-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# NOTE: scripts/deploy.sh overwrites this file with values from
# Replit Secrets before deploying. These are local dev defaults.

[[d1_databases]]
binding = "DB"
database_name = "lifegram"
database_id = "local-dev-placeholder"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "local-dev-placeholder"

[triggers]
crons = ["*/2 * * * *"]

[vars]
NODE_ENV = "production"
