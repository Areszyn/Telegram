kind = "api"
previewPath = "/mtproto"
title = "MTProto Backend"
version = "1.0.0"
id = "mtproto-backend-001"

[[services]]
localPort = 3003
name = "MTProto Backend"
paths = ["/mtproto"]

[services.env]
PORT = "3003"
BASE_PATH = "/mtproto"

[services.development]
run = "pnpm --filter @workspace/mtproto-backend run dev"

[services.production]
build = "pnpm --filter @workspace/mtproto-backend install"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/mtproto-backend", "run", "start"]

[services.production.run.env]
PORT = "3003"

[services.production.health.startup]
path = "/mtproto/health"
